<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-mark">纪</span>
          <span class="brand-text">
            <strong>{{ site.title }}</strong>
            <small>公开纪念站</small>
          </span>
        </a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">首页</a>
          <a href="{{ '/public/人物传记/' | relative_url }}">人物传记</a>
          <a href="{{ '/docs/经典视频/' | relative_url }}">经典视频</a>
          <a href="{{ '/docs/图书著作/' | relative_url }}">图书著作</a>
          <a href="{{ '/docs/时间线/' | relative_url }}">时间线</a>
          <a href="{{ '/docs/公益与助学/' | relative_url }}">公益与助学</a>
          <a href="{{ '/docs/参考来源/' | relative_url }}">参考来源</a>
        </nav>
      </header>

      <main class="site-main">
        {{ content }}
      </main>

      <footer class="site-footer">
        <p>公开内容仅收录链接、摘要、时间线与可核验来源，不提供受版权保护内容的整段搬运。</p>
      </footer>
    </div>
  </body>
</html>
